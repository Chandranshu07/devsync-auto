name: Daily Auto Commit

on:
  schedule:
    - cron: '10 8 * * *'   # Runs daily at 08:10 UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Update file - 23f3000070@ds.study.iitm.ac.in
        run: |
          echo "Updated on $(date)" >> daily-log.txt

      - name: Commit changes
        run: |
          git config --local user.email "23f3000070@ds.study.iitm.ac.in"
          git config --local user.name "DevSync Bot"
          git add daily-log.txt
          git commit -m "Daily automated commit"
          git push
