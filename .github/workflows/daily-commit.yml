name: Daily Auto Commit

on:
  schedule:
    - cron: '15 9 * * *'   # Runs daily at 09:15 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Update file - 23f3000070@ds.study.iitm.ac.in
        run: |
          echo "Updated on $(date)" >> daily-log.txt

      - name: Commit changes
        run: |
          git config user.name "DevSync Bot"
          git config user.email "23f3000070@ds.study.iitm.ac.in"
          git add daily-log.txt
          git commit -m "Daily automated commit" || echo "No changes"
          git push
